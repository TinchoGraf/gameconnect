# Configuración de Alembic para GameConnect.
#
# La sqlalchemy.url no está hardcodeada acá — la sobrescribimos en env.py
# usando la DATABASE_URL del .env. Eso permite que la misma config funcione
# en desarrollo (SQLite) y producción (PostgreSQL) sin tocar este archivo.

[alembic]
# Path donde viven las migraciones (relativo al directorio raíz del proyecto)
script_location = alembic

# Nombrá las migraciones con timestamp para que el orden cronológico sea obvio:
# Ejemplo: 2026_06_04_1845-abc123_agregar_campo_flagged.py
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Agregamos el directorio actual al sys.path para que Alembic encuentre
# nuestro paquete "app"
prepend_sys_path = .

# URL placeholder — se sobrescribe en env.py
sqlalchemy.url = sqlite:///./gameconnect.db


# Configuración de logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
